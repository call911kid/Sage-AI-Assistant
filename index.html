<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sage AI</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Chats</h2>
            </div>
            <button class="new-chat-btn" id="newChatBtn">
                <span class="icon">+</span> New Chat
            </button>
            <div class="session-list" id="sessionList">
                <!-- Session items go here -->
            </div>
        </aside>

        <button class="edge-toggle-btn" id="edgeToggleBtn" aria-label="Toggle Sidebar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6" />
            </svg>
        </button>

        <!-- Main Chat Area -->
        <main class="main-content" id="mainContent">
            <header class="top-nav">
    <div class="brand">

        <h1>Sage AI Assistant</h1>
    </div>
</header>

            <div class="chat-container" id="chatContainer">
                <div class="welcome-screen" id="welcomeScreen">
                    <h1>How can I help you today?</h1>
                    <p>Experience the power of gpt-oss-120b</p>
                </div>
                <div class="message-history" id="messageHistory">
                    <!-- Messages go here -->
                </div>

            </div>

            <button id="scrollToBottomBtn" class="scroll-to-bottom-btn" aria-label="Scroll to bottom">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="2.5"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 5v14M19 12l-7 7-7-7" />
                </svg>
            </button>

            <!-- Input Area -->
            <div class="input-container">
                <form class="input-form" id="chatForm">
                    <button type="button" class="image-mode-toggle" id="imageModeToggle"
                        title="Toggle Image Generation Mode">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                    </button>
                    <div class="textarea-wrapper">
                        <textarea id="messageInput" placeholder="Message Sage AI..." rows="1" autofocus></textarea>
                    </div>
                    <div class="submit-action-container">
                        <button type="submit" id="submitBtn" class="send-btn" aria-label="Send message">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                        </button>
                        <button type="button" id="stopBtn" class="stop-btn" style="display: none;" aria-label="Stop generation">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="4" y="4" width="16" height="16"></rect></svg>
                        </button>
                    </div>
                </form>
                <div class="disclaimer">
                    AI can make mistakes. Consider verifying important information.
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="config.js"></script>
    <script src="src/script.js"></script>
</body>

</html>
